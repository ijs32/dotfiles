# ============================================================
# ~/.tmux.conf
# ============================================================

# ---- Prefix ------------------------------------------------
# Ctrl-b is awkward. Ctrl-a is the classic remap (matches screen).
# If you use Ctrl-a at the shell for beginning-of-line, press it
# twice — the `bind C-a send-prefix` below forwards it through.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---- General sanity ---------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # true color passthrough
set -g history-limit 50000                  # scrollback buffer
set -g escape-time 10                       # don't delay Esc (critical for nvim)
set -g focus-events on                      # pass focus events to nvim, etc.
set -g mouse on                             # mouse scroll / pane resize / click to select
set -g base-index 1                         # windows start at 1, not 0
setw -g pane-base-index 1                   # same for panes
set -g renumber-windows on                  # renumber when a window closes
set -g set-titles on                        # set terminal title
set -g display-time 2000                    # status messages stay up 2s
set -g status-interval 5                    # refresh status every 5s

# ---- Reload config ----------------------------------------
# prefix + r  ->  reload this file
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ---- Splits: intuitive keys + open in same directory -------
# prefix + |   vertical split (looks like the split)
# prefix + -   horizontal split
# Default "c new window" also opens in current pane's directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window   -c "#{pane_current_path}"
unbind '"'
unbind %

# ---- Pane navigation: vim-style hjkl ----------------------
# prefix + h/j/k/l  to move between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (prefix + H/J/K/L, repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---- Window navigation ------------------------------------
# Alt + number to jump to a window without pressing prefix
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Alt + h/l for prev/next window (no prefix)
bind -n M-h previous-window
bind -n M-l next-window

# ---- Copy mode: vim-style ---------------------------------
setw -g mode-keys vi

# prefix + [  enters copy mode (default), then:
#   v  start selection
#   V  select whole line
#   y  yank to tmux buffer (and system clipboard if available)
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi V   send-keys -X select-line
bind-key -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
# On macOS, replace xclip line with:
# send-keys -X copy-pipe-and-cancel "pbcopy"
# On WSL, xclip works if installed; wl-copy works on Wayland.

# prefix + p  paste from tmux buffer
bind p paste-buffer

# ---- Status bar: minimal and readable ---------------------
set -g status-position top
set -g status-justify left
set -g status-style "bg=default,fg=white"

# Left: session name in a subtle highlight
set -g status-left-length 30
set -g status-left "#[fg=black,bg=cyan,bold] #S #[default] "

# Window list: current window highlighted
setw -g window-status-format         " #I:#W "
setw -g window-status-current-format "#[fg=black,bg=yellow,bold] #I:#W #[default]"

# Right: date/time (add battery, load, etc. if you want)
set -g status-right-length 50
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=yellow]%H:%M "

# ---- Pane borders: subtle, with active highlighted --------
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=cyan"

# ---- Activity monitoring ----------------------------------
setw -g monitor-activity on
set -g visual-activity off   # don't steal focus, just mark it

# ============================================================
# Optional: tmux plugin manager (tpm)
# ============================================================
# Install tpm first:
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then uncomment below, reload config, press prefix + I to install plugins.
#
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'    # save/restore sessions manually
set -g @plugin 'tmux-plugins/tmux-continuum'    # auto-save sessions
set -g @plugin 'christoomey/vim-tmux-navigator' # seamless nvim <-> tmux nav
#
set -g @continuum-restore 'on'
#
run '~/.tmux/plugins/tpm/tpm'   # keep this line LAST
